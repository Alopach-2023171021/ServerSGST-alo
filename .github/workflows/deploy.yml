name: CI/CD Pipeline - Node.js to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  sonarqube-analysis:
    name: Análisis de Calidad (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=serversgst-alondra
            -Dsonar.qualitygate.wait=true

  k6-performance:
    name: Prueba de Rendimiento (K6)
    runs-on: ubuntu-latest
    needs: sonarqube-analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run K6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/load-test.js

  build-and-push:
    name: Empaquetado Docker (GHCR)
    runs-on: ubuntu-latest
    needs: k6-performance
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Despliegue Automático (CD)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to Cloud Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            docker run -d \
              --name my-node-app \
              -p 5000:5000 \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
